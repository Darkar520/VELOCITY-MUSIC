<!DOCTYPE html>
<html lang="es" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0a0a0c" />
    <title>Velocity Music</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div id="setup-banner" class="setup-banner hidden" role="status">
      <span class="setup-banner__dot"></span>
      <div class="setup-banner__text">
        <strong>Alta fidelidad inactiva.</strong>
        Instala el motor de audio para reproducir pistas completas.
      </div>
      <code id="setup-command" class="setup-command"></code>
      <button id="install-command" class="btn btn--accent btn--sm">Instalar ahora</button>
      <button id="copy-command" class="btn btn--ghost btn--sm">Copiar</button>
      <button id="dismiss-banner" class="iconbtn" title="Descartar">✕</button>
    </div>

    <div class="app">
      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="brand">
          <span class="brand__logo">◆</span><span class="brand__name">Velocity</span>
        </div>
        <nav class="nav">
          <button class="nav__item is-active" data-view="home"><span class="nav__ic">⌂</span> Inicio</button>
          <button class="nav__item" data-view="search"><span class="nav__ic">🔎</span> Buscar</button>
          <button class="nav__item" data-view="library"><span class="nav__ic">≣</span> Tu biblioteca</button>
        </nav>
        <div class="sidebar__lib">
          <button id="new-playlist" class="nav__sub">＋ Crear lista de reproducción</button>
          <button class="nav__sub" data-view="library" data-tab="favorites">♥ Tus me gusta</button>
          <div id="sidebar-playlists" class="sidebar__playlists"></div>
        </div>
        <div class="sidebar__footer">
          <button id="theme-toggle" class="btn btn--ghost btn--sm">🌗 Tema</button>
        </div>
      </aside>

      <!-- Main -->
      <main class="main" id="main-scroll">
        <header class="topbar">
          <div class="topbar__nav">
            <button class="iconbtn" id="nav-back" title="Atrás">‹</button>
          </div>
          <div class="search" id="search-wrap">
            <span class="search__icon">🔎</span>
            <input id="search-input" class="search__input" type="search" placeholder="¿Qué quieres escuchar?" autocomplete="off" />
          </div>
          <div class="topbar__right">
            <span id="status-pill" class="status-pill" title="Estado">●</span>
            <button id="auth-button" class="btn btn--pill">Iniciar sesión</button>
          </div>
        </header>

        <section id="view-home" class="view"></section>
        <section id="view-search" class="view hidden"></section>
        <section id="view-library" class="view hidden"></section>
      </main>
    </div>

    <!-- Now playing bar -->
    <footer id="now-playing" class="now-playing hidden">
      <div class="np__track" id="np-open">
        <img id="np-art" class="np__art" alt="" />
        <div class="np__meta">
          <div id="np-title" class="np__title">—</div>
          <div id="np-artist" class="np__artist">—</div>
        </div>
        <button id="np-fav" class="iconbtn" title="Me gusta">♡</button>
      </div>
      <div class="np__center">
        <div class="np__controls">
          <button id="np-shuffle" class="iconbtn" title="Aleatorio">🔀</button>
          <button id="np-prev" class="iconbtn">⏮</button>
          <button id="np-play" class="btn--play">▶</button>
          <button id="np-next" class="iconbtn">⏭</button>
          <button id="np-repeat" class="iconbtn" title="Repetir">🔁</button>
        </div>
        <div class="np__progress">
          <span id="np-cur" class="np__time">0:00</span>
          <input id="np-seek" class="np__seek" type="range" min="0" max="1000" value="0" />
          <span id="np-dur" class="np__time">0:00</span>
        </div>
      </div>
      <div class="np__extra">
        <select id="np-quality" class="np__quality" title="Calidad de audio">
          <option value="high">Alta</option>
          <option value="medium">Media</option>
          <option value="low">Baja</option>
        </select>
        <button id="np-queue" class="iconbtn" title="Cola">≣</button>
        <span class="np__vol-ic">🔊</span>
        <input id="np-vol" class="np__vol" type="range" min="0" max="100" value="100" />
      </div>
      <audio id="audio" preload="auto"></audio>
    </footer>

    <!-- Queue panel -->
    <aside id="queue-panel" class="queue hidden">
      <div class="queue__head"><h3>Cola de reproducción</h3><button id="queue-close" class="iconbtn">✕</button></div>
      <div id="queue-list" class="queue__list"></div>
    </aside>

    <!-- Fullscreen player -->
    <div id="fullscreen" class="fullscreen hidden">
      <div id="fs-bg" class="fullscreen__bg"></div>
      <button id="fs-close" class="iconbtn fullscreen__close">▾</button>
      <img id="fs-art" class="fullscreen__art" alt="" />
      <div class="fullscreen__meta">
        <div id="fs-title" class="fullscreen__title">—</div>
        <div id="fs-artist" class="fullscreen__artist">—</div>
      </div>
      <div class="fullscreen__progress">
        <span id="fs-cur" class="np__time">0:00</span>
        <input id="fs-seek" class="np__seek" type="range" min="0" max="1000" value="0" />
        <span id="fs-dur" class="np__time">0:00</span>
      </div>
      <div class="fullscreen__controls">
        <button id="fs-shuffle" class="iconbtn">🔀</button>
        <button id="fs-prev" class="iconbtn">⏮</button>
        <button id="fs-play" class="btn--play btn--play-lg">▶</button>
        <button id="fs-next" class="iconbtn">⏭</button>
        <button id="fs-repeat" class="iconbtn">🔁</button>
      </div>
    </div>

    <!-- Auth modal -->
    <div id="auth-modal" class="modal hidden">
      <div class="modal__card">
        <h2 id="auth-title">Iniciar sesión</h2>
        <input id="auth-email" class="input" type="email" placeholder="Email" />
        <input id="auth-password" class="input" type="password" placeholder="Contraseña" />
        <p id="auth-error" class="auth-error"></p>
        <button id="auth-submit" class="btn btn--accent btn--block">Entrar</button>
        <button id="auth-switch" class="btn btn--ghost btn--block">Crear cuenta</button>
        <button id="auth-cancel" class="iconbtn modal__close">✕</button>
      </div>
    </div>

    <div id="toast" class="toast hidden"></div>
    <script type="module" src="/app/main.js"></script>
  </body>
</html>
