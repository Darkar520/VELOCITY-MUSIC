<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#04060a" />
    <meta name="description" content="Velocity Music — reproduce, descarga y organiza tu música favorita. Busca canciones, álbumes y artistas en streaming." />

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" href="/icon-192.png" />

    <!-- iOS: instalar en pantalla de inicio como app -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Velocity" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <title>Velocity Music</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Registro del Service Worker (PWA) + detección automática de versiones -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            const check = () => reg.update().catch(() => {});
            check();
            // Revisar si hay versión nueva cada 20 min y al volver a la app.
            setInterval(check, 20 * 60 * 1000);
            document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') check(); });
            reg.addEventListener('updatefound', () => {
              const nw = reg.installing;
              if (!nw) return;
              nw.addEventListener('statechange', () => {
                // Nueva versión instalada y ya hay uno controlando → activarla.
                if (nw.state === 'installed' && navigator.serviceWorker.controller) nw.postMessage('SKIP_WAITING');
              });
            });
          }).catch(() => {});
        });
      }
    </script>
  </body>
</html>
