<!DOCTYPE html>
<html><head><title>Velocity Music · Google</title></head>
<body style="background:#04060a;color:#fff;font-family:system-ui;display:flex;align-items:center;justify-content:center;height:100vh;margin:0">
<p>Cerrando…</p>
<script>
  // Google Identity Services (GIS) envía el JWT en el parámetro `credential`.
  // El formato OAuth 2.0 clásico usaba `id_token`, pero Google lo deprecó
  // en favor de GIS. Aceptamos ambos por compatibilidad con cualquier
  // configuración de Google Cloud Console.
  const params = new URLSearchParams(location.hash.slice(1));
  const idToken = params.get('credential') || params.get('id_token');
  if (idToken && window.opener) {
    window.opener.postMessage({ idToken }, location.origin);
  }
  window.close();
</script>
</body></html>
